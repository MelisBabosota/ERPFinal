services:
  - type: web
    name: blackrain-erp
    env: node
    plan: free
    buildCommand: npm run render-build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: blackrain-db
          property: connectionString

databases:
  - name: blackrain-db
    plan: free
    databaseName: blackrain_erp
    user: blackrain_erp

