services:
  - type: web
    name: blackrain-erp
    runtime: node
    plan: free
    buildCommand: npm install --prefix backend && npm install --prefix frontend && npm run build --prefix frontend
    startCommand: npm start --prefix backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: blackrain-db
          property: connectionString

databases:
  - name: blackrain-db
    plan: free
    databaseName: blackrain_erp
    user: blackrain_erp

